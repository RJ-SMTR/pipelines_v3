name: capture__stu_tabelas
prefect-version: 3.4.8

build:
  - prefect.deployments.steps.run_shell_script:
      id: get-commit-hash
      script: git rev-parse --short HEAD
      stream_output: false
  - prefect_docker.deployments.steps.build_docker_image:
      id: build-image
      requires: prefect-docker>=0.6.5
      image_name: ghcr.io/rj-smtr/pipelines_v3/deployments
      tag: "capture__stu_tabelas-{{ get-commit-hash.stdout }}"
      dockerfile: pipelines/capture__stu_tabelas/Dockerfile

push:
  - prefect_docker.deployments.steps.push_docker_image:
      requires: prefect-docker>=0.6.5
      image_name: "{{ build-image.image_name }}"
      tag: "{{ build-image.tag }}"

pull:
  - prefect.deployments.steps.set_working_directory:
      directory: /opt/prefect/pipelines_v3

deployments:
  - name: rj-capture--stu_tabelas--staging
    version: "{{ build-image.tag }}"
    entrypoint: pipelines/capture__stu_tabelas/flow.py:capture__stu_tabelas
    work_pool:
      name: smtr-pool
      work_queue_name: default
      job_variables:
        image: "{{ build-image.image_name }}:{{ build-image.tag }}"
        command: uv run --package capture__stu_tabelas -- prefect flow-run execute
        secretName: prefect-jobs-secrets-staging
        image_pull_policy: Always
        cpu_limit: "1000m"
        memory_limit: "4600Mi"
        cpu_request: "500m"
        memory_request: "1000Mi"
  - name: rj-capture--stu_tabelas--prod
    version: "{{ get-commit-hash.stdout }}"
    entrypoint: pipelines/capture__stu_tabelas/flow.py:capture__stu_tabelas
    schedules:
      - cron: "15 5 * * *"
        timezone: America/Sao_Paulo
        parameters:
          recapture: true
          source_table_ids:
            [
              combustivel,
              tipo_de_transporte,
              tipo_de_permissionario,
              tipo_de_permissao,
              mod_carroceria,
              tipo_de_veiculo,
              mod_chassi,
              modelo,
              permis_empresa_escola,
              planta,
              pessoa_juridica,
            ]
      - cron: "16 5 * * *"
        timezone: America/Sao_Paulo
        parameters:
          recapture: true
          source_table_ids: [veiculo_ativo, permissao]
      - cron: "17 5 * * *"
        timezone: America/Sao_Paulo
        parameters:
          recapture: true
          source_table_ids: [multa_postagem]
      - cron: "18 5 * * *"
        timezone: America/Sao_Paulo
        parameters:
          recapture: true
          source_table_ids: [veiculo]
      - cron: "19 5 * * *"
        timezone: America/Sao_Paulo
        parameters:
          recapture: true
          source_table_ids: [talonario]
      - cron: "20 5 * * *"
        timezone: America/Sao_Paulo
        parameters:
          recapture: true
          source_table_ids: [guia]
      - cron: "21 5 * * *"
        timezone: America/Sao_Paulo
        parameters:
          recapture: true
          source_table_ids: [pessoa_fisica]
      - cron: "22 5 * * *"
        timezone: America/Sao_Paulo
        parameters:
          recapture: true
          source_table_ids: [vistoria]
      - cron: "23 5 * * *"
        timezone: America/Sao_Paulo
        parameters:
          recapture: true
          source_table_ids: [multa]
      - cron: "24 5 * * *"
        timezone: America/Sao_Paulo
        parameters:
          recapture: true
          source_table_ids: [darm_apropriacao]
      - cron: "25 5 * * *"
        timezone: America/Sao_Paulo
        parameters:
          recapture: true
          source_table_ids: [controle_processo]
    work_pool:
      name: smtr-pool
      work_queue_name: default
      job_variables:
        image: "{{ build-image.image_name }}:{{ build-image.tag }}"
        command: uv run --package capture__stu_tabelas -- prefect flow-run execute
        secretName: prefect-jobs-secrets
        image_pull_policy: Always
        cpu_limit: "1000m"
        memory_limit: "4600Mi"
        cpu_request: "500m"
        memory_request: "1000Mi"
