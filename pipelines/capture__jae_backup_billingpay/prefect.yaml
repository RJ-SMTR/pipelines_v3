name: capture__jae_backup_billingpay
prefect-version: 3.4.8

build:
  - prefect.deployments.steps.run_shell_script:
      id: get-commit-hash
      script: git rev-parse --short HEAD
      stream_output: false
  - prefect_docker.deployments.steps.build_docker_image:
      id: build-image
      requires: prefect-docker>=0.6.5
      image_name: ghcr.io/rj-smtr/pipelines_v3/deployments
      tag: "capture__jae_backup_billingpay-{{ get-commit-hash.stdout }}"
      dockerfile: pipelines/capture__jae_backup_billingpay/Dockerfile

push:
  - prefect_docker.deployments.steps.push_docker_image:
      requires: prefect-docker>=0.6.5
      image_name: "{{ build-image.image_name }}"
      tag: "{{ build-image.tag }}"

pull:
  - prefect.deployments.steps.set_working_directory:
      directory: /opt/prefect/pipelines_v3

deployments:
  - name: rj-capture--jae_backup_billingpay--staging
    version: "{{ build-image.tag }}"
    entrypoint: pipelines/capture__jae_backup_billingpay/flow.py:capture__jae_backup_billingpay
    work_pool:
      name: smtr-pool
      work_queue_name: default
      job_variables:
        image: "{{ build-image.image_name }}:{{ build-image.tag }}"
        command: uv run --package capture__jae_backup_billingpay -- prefect flow-run execute
        secretName: prefect-jobs-secrets-staging
        image_pull_policy: Always
  - name: rj-capture--jae_backup_billingpay--prod
    version: "{{ get-commit-hash.stdout }}"
    entrypoint: pipelines/capture__jae_backup_billingpay/flow.py:capture__jae_backup_billingpay
    schedules:
      - cron: "0 */6 * * *"
        timezone: America/Sao_Paulo
        parameters:
          database_name: processador_transacao_db
      - cron: "30 */6 * * *"
        timezone: America/Sao_Paulo
        parameters:
          database_name: financeiro_db
      - cron: "0 */6 * * *"
        timezone: America/Sao_Paulo
        parameters:
          database_name: midia_db
      - cron: "0 1 * * *"
        timezone: America/Sao_Paulo
        parameters:
          database_name: principal_db
      - cron: "30 1 * * *"
        timezone: America/Sao_Paulo
        parameters:
