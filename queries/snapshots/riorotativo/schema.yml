version: 2

snapshots:
  - name: snapshot_entidade_credenciadora_riorotativo
    description: "Uma linha por versão de razão social/nome fantasia por CNPJ de entidade credenciadora do Rio Rotativo (tabela entidade_credenciadora). Histórico SCD2 via dbt snapshot (strategy check): dbt_valid_from/dbt_valid_to delimitam a vigência observada e o registro vigente tem dbt_valid_to nulo. Use cnpj para junções com agente_credenciado_riorotativo. Fonte: rj-crm-registry.rmi_dados_mestres.pessoa_juridica (estado atual, sem histórico próprio). O histórico começa na primeira execução e a granularidade é a cadência de execução — não é backfillável. Os CNPJs acompanhados são os já observados em agente_credenciado_riorotativo_historico, portanto o snapshot (selector riorotativo_snapshot) deve ser executado após a materialização do histórico (selector riorotativo_diario)."
    columns:
      - name: cnpj
        description: "{{ doc('cnpj_entidade_credenciadora_riorotativo') }}"
      - name: razao_social
        description: Razão social no cadastro do CNPJ da entidade credenciadora
      - name: nome_fantasia
        description: Nome fantasia no cadastro do CNPJ da entidade credenciadora
      - name: dbt_valid_from
        description: Datetime de início de vigência do registro de histórico
      - name: dbt_valid_to
        description: Datetime de fim de vigência do registro de histórico (nulo se ainda vigente; preenchido também quando o CNPJ some da fonte)
      - name: dbt_scd_id
        description: Identificador único do registro de histórico gerado pelo dbt snapshot
      - name: dbt_updated_at
        description: Datetime em que o registro foi processado pelo dbt snapshot
