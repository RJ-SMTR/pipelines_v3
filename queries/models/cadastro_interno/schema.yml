  - name: veiculo_ativo
    description: |
      Estado atual: 1 linha por (placa, tptran, tpperm, termo), última versão mantida via `merge`
      incremental sobre a janela recente. Histórico bruto (todas as capturas)
      em `staging_stu_veiculo_ativo`. Chave de join: (placa, tptran, tpperm, termo). Source: source_stu.veiculo_ativo.
    columns:
      - name: data
        description: Data de captura da versão vigente
        tests: [not_null]
      - name: placa
        description: Componente da chave de join
      - name: tptran
        description: Componente da chave de join
      - name: tpperm
        description: Componente da chave de join
      - name: termo
        description: Componente da chave de join

  - name: staging_stu_veiculo_ativo
