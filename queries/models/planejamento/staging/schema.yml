version: 2

models:
  - name: aux_calendario_manual
    description: >
      Uma linha por data com alguma modificação manual do calendário operacional. Mantém o
      histórico das regras aplicadas, não sendo um snapshot do estado atual. Use `data` como
      chave de join com os modelos de calendário e planejamento; não há exceções de
      granularidade. Fonte: regras históricas congeladas no próprio modelo antes de var('data_inicio_calendario_sheets')
      e `source_smtr.calendario_manual` a partir dessa data. Datas sem `feed_start_date`,
      `tipo_dia`, `subtipo_dia` ou `tipo_os` são excluídas.
    columns:
      - name: data
        description: "Data do dia atípico"
        data_type: date
      - name: feed_start_date
        description: "{{ doc('feed_start_date') }}"
        data_type: date
      - name: tipo_dia
        description: "{{ doc('tipo_dia') }}"
        data_type: string
      - name: subtipo_dia
        description: "{{ doc('subtipo_dia') }}"
        data_type: string
      - name: tipo_os
        description: "{{ doc('tipo_os') }}"
        data_type: string
