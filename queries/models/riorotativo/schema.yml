  - name: agente_verificacao_riorotativo_historico
    description: |
      Uma linha por agente de verificação (documento), por entidade de vínculo (cnpj), por data de captura,
      com o status do dia (ativo ou bloqueado).
      Agentes de verificação são servidores municipais ou empregados do Operador Tecnológico
      designados pela SMTR (Decreto Rio 58277/2026, art. 16, §1º).
      Histórico diário incremental, idempotente e reexecutável por período (date_range_start/date_range_end).
      Use documento e data para junções; id_agente_verificacao_historico é a chave única.
      Fonte: staging_agente_verificacao_riorotativo e staging_lista_bloqueio_riorotativo, enriquecidas com
      cliente_jae e entidade_credenciadora_riorotativo_historico.
      Bloqueado exige vigência na data (data entre data_inicio_bloqueio e data_fim_bloqueio).
      Documento bloqueado que não está na lista de agentes não gera registro.
      Agente ausente em uma data na qual já havia aparecido indica remoção.
      Dias sem captura não têm registros.
      razao_social/nome_fantasia refletem o valor vigente na data.
      nome/email/telefone refletem o valor vigente no momento do processamento.
    tests:
      - dbt_utils.expression_is_true:
          name: dbt_utils.expression_is_true__agente_verificacao_riorotativo_historico
          arguments:
            expression: >-
              concat(cast(data as string), '-', documento) not in (
                  select concat(cast(data as string), '-', documento)
                  from {{ ref('guardador_veiculo_riorotativo_historico') }}
                  where
                      data between date('{{ var("date_range_start") }}')
                      and date('{{ var("date_range_end") }}')
              )
          config:
            where: >-
              data between date('{{ var("date_range_start") }}')
              and date('{{ var("date_range_end") }}')
    columns:
      - name: id_agente_verificacao_historico
        description: Identificador único do registro de histórico (hash de data, CNPJ e documento)
        data_type: string
        quote: true
        tests:
          - unique:
              name: unique__id_agente_verificacao_historico__agente_verificacao_riorotativo_historico
          - not_null:
              name: not_null__id_agente_verificacao_historico__agente_verificacao_riorotativo_historico
