  - name: entidade_credenciadora_riorotativo_historico
    description: |
      Uma linha por versão de razão social/nome fantasia por CNPJ do Rio Rotativo, com vigência em datas.
      Fonte: rj-crm-registry.rmi_dados_mestres.pessoa_juridica.
      Cada execução observa o valor corrente e abre nova vigência quando ele muda.
      A versão vigente tem data_fim_vigencia nula.
      CNPJ que deixa de aparecer nas stagings mantém a última vigência aberta.
      Os CNPJs acompanhados são os observados em staging_guardador_veiculo_riorotativo e
      staging_agente_verificacao_riorotativo.
      Use cnpj e a vigência para junções.
    tests:
      - dbt_utils.unique_combination_of_columns:
          name: dbt_utils.unique_combination_of_columns__entidade_credenciadora_riorotativo_historico
          arguments:
            combination_of_columns:
              - cnpj
              - data_inicio_vigencia
    columns:
      - name: cnpj
        description: "{{ doc('cnpj_entidade_credenciadora_riorotativo') }}"
        data_type: string
        quote: true
      - name: data_inicio_vigencia
        description: Data de início de vigência da versão, observada a partir da primeira execução do projeto
        data_type: date
        quote: true
        tests:
          - not_null:
              name: not_null__data_inicio_vigencia__entidade_credenciadora_riorotativo_historico
      - name: data_fim_vigencia
        description: Data de fim de vigência da versão (nula enquanto vigente)
        data_type: date
        quote: true
      - name: razao_social
        description: "{{ doc('razao_social_entidade_credenciadora_riorotativo') }}"
        data_type: string
        quote: true
      - name: nome_fantasia
        description: "{{ doc('nome_fantasia_entidade_credenciadora_riorotativo') }}"
        data_type: string
        quote: true
      - name: versao
        description: "{{ doc('versao') }}"
        data_type: string
        quote: true
      - name: datetime_ultima_atualizacao
        description: "{{ doc('datetime_ultima_atualizacao') }}"
        data_type: datetime
        quote: true
      - name: id_execucao_dbt
        description: "{{ doc('id_execucao_dbt') }}"
        data_type: string
        quote: true
  - name: area_estacionamento_riorotativo
