        quote: true
      - name: cnpj
        description: "{{ doc('cnpj_entidade_vinculo_agente_verificacao_riorotativo') }}"
        data_type: string
        quote: true
      - name: documento
        description: "{{ doc('documento_cliente') }} [protegido]"
        data_type: string
        quote: true
        policy_tags:
          - "projects/rj-smtr/locations/us/taxonomies/3253131507972485630/policyTags/7025840748337599362"
        tests:
          - not_null:
              name: not_null__documento__agente_verificacao_riorotativo_historico
          - dbt_expectations.expect_column_values_to_match_regex:
              name: dbt_expectations.expect_column_values_to_match_regex__documento__agente_verificacao_riorotativo_historico
              arguments:
                regex: "^[0-9]{11}$"
      - name: tipo_documento
        description: "{{ doc('tipo_documento_agente_verificacao_riorotativo') }}"
        data_type: string
        quote: true
      - name: id_cliente
        description: "{{ doc('id_cliente') }}"
        data_type: string
        quote: true
        policy_tags:
          - "projects/rj-smtr/locations/us/taxonomies/3253131507972485630/policyTags/8608468264029421163"
      - name: nome
