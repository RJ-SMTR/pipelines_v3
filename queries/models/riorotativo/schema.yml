  - name: perfil_funcionamento_riorotativo_historico
    description: |
      Uma linha por exceção de perfil de funcionamento (área OU perfil + decisão) vigente, por data de captura.
      Histórico diário incremental, idempotente e reexecutável por período (date_range_start/date_range_end).
      Use id_area ou id_perfil_funcionamento e data para junções; id_perfil_funcionamento_historico é a chave única.
      Fonte: staging_perfil_funcionamento_excecao_riorotativo
      (captura source_riorotativo.perfil_funcionamento_excecao).
      Contém apenas exceções vigentes na data da captura (data entre datetime_inicio e datetime_fim) —
      exceção expirada ou futura que permanece na fonte não entra no dia.
      Exatamente um entre id_area e id_perfil_funcionamento é preenchido.
      Exceção ausente em uma data pode indicar remoção na fonte ou vigência não alcançada/encerrada.
    tests:
      - dbt_utils.expression_is_true:
          name: dbt_utils.expression_is_true__perfil_funcionamento_riorotativo_historico
          arguments:
            expression: "(id_area is null) != (id_perfil_funcionamento is null)"
    columns:
      - name: id_perfil_funcionamento_historico
        description: Identificador único do registro de histórico (hash de data, perfil, área e decisão)
        data_type: string
        quote: true
        tests:
          - unique:
              name: unique__id_perfil_funcionamento_historico__perfil_funcionamento_riorotativo_historico
          - not_null:
              name: not_null__id_perfil_funcionamento_historico__perfil_funcionamento_riorotativo_historico
      - name: data
        description: "{{ doc('data_captura') }} (partição)"
        data_type: date
        quote: true
      - name: id_perfil_funcionamento
        description: "{{ doc('perfil_funcionamento_excecao_perfil_codigo_riorotativo') }}"
        data_type: string
        quote: true
      - name: id_area
        description: "{{ doc('perfil_funcionamento_excecao_area_codigo_riorotativo') }}"
        data_type: string
        quote: true
      - name: datetime_inicio
        description: "{{ doc('perfil_funcionamento_excecao_datetime_inicio_riorotativo') }}"
        data_type: datetime
        quote: true
      - name: datetime_fim
        description: "{{ doc('perfil_funcionamento_excecao_datetime_fim_riorotativo') }}"
