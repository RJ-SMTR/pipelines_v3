models:
  - name: guardador_veiculo_riorotativo
    description: |
      Uma linha por guardador de veículo ativo (documento) por entidade credenciadora (cnpj) no Rio Rotativo Digital.
      Estado atual: guardadores de veículo com status ativo na última partição da janela date_range_start/date_range_end.
      Desabilitado em backfills com janela antiga (is_current_state_enabled), para não sobrescrever o estado atual
      com dados históricos.
      Use documento para junções; id_cliente relaciona com cliente_jae.
      Fonte: última partição de guardador_veiculo_riorotativo_historico dentro da janela.
      Guardador de veículo ausente da última captura é considerado removido; guardadores de veículo bloqueados são excluídos —
      para status e histórico use guardador_veiculo_riorotativo_historico.
    columns:
      - name: documento
        description: "{{ doc('documento_cliente') }} [protegido]"
        data_type: string
        quote: true
        policy_tags:
          - "projects/rj-smtr/locations/us/taxonomies/3253131507972485630/policyTags/7025840748337599362"
        tests:
          - not_null:
              name: not_null__documento__guardador_veiculo_riorotativo
          - dbt_expectations.expect_column_values_to_match_regex:
              name: dbt_expectations.expect_column_values_to_match_regex__documento__guardador_veiculo_riorotativo
              arguments:
                regex: "^[0-9]{11}$"
      - name: tipo_documento
        description: "{{ doc('tipo_documento_guardador_veiculo_riorotativo') }}"
        data_type: string
        quote: true
      - name: id_cliente
        description: "{{ doc('id_cliente') }}"
        data_type: string
        quote: true
        policy_tags:
          - "projects/rj-smtr/locations/us/taxonomies/3253131507972485630/policyTags/8608468264029421163"
      - name: cnpj
        description: "{{ doc('cnpj_entidade_credenciadora_riorotativo') }}"
        data_type: string
        quote: true
      - name: nome
        description: "{{ doc('nome_cliente') }} [protegido]"
        data_type: string
        quote: true
        policy_tags:
          - "projects/rj-smtr/locations/us/taxonomies/3253131507972485630/policyTags/7025840748337599362"
      - name: email
        description: "{{ doc('email_guardador_veiculo_riorotativo') }} [protegido]"
        data_type: string
        quote: true
        policy_tags:
          - "projects/rj-smtr/locations/us/taxonomies/3253131507972485630/policyTags/7025840748337599362"
      - name: telefone
        description: "{{ doc('telefone_cliente') }} [protegido]"
        data_type: string
        quote: true
        policy_tags:
          - "projects/rj-smtr/locations/us/taxonomies/3253131507972485630/policyTags/7025840748337599362"
      - name: razao_social
        description: "{{ doc('razao_social_entidade_credenciadora_riorotativo') }}"
        data_type: string
        quote: true
      - name: nome_fantasia
        description: "{{ doc('nome_fantasia_entidade_credenciadora_riorotativo') }}"
        data_type: string
        quote: true
  - name: guardador_veiculo_riorotativo_historico
    description: |
      Uma linha por guardador de veículo (documento), por entidade credenciadora (cnpj), por data de captura,
      com o status do dia (ativo ou bloqueado).
      Histórico diário incremental, idempotente e reexecutável por período (date_range_start/date_range_end).
      Use documento e data para junções; id_guardador_veiculo_historico é a chave única.
      Fonte: staging_guardador_veiculo_riorotativo e staging_lista_bloqueio_riorotativo, enriquecidas com
      cliente_jae e entidade_credenciadora_riorotativo_historico.
      Bloqueado exige vigência na data (data entre data_inicio_bloqueio e data_fim_bloqueio).
      Documento bloqueado que não está na lista de guardadores de veículo não gera registro.
      Guardador de veículo ausente em uma data na qual já havia aparecido indica remoção.
      Dias sem captura não têm registros.
      razao_social/nome_fantasia refletem o valor vigente na data.
      nome/email/telefone refletem o valor vigente no momento do processamento.
    columns:
      - name: id_guardador_veiculo_historico
        description: Identificador único do registro de histórico (hash de data, CNPJ e documento)
        data_type: string
        quote: true
        tests:
          - unique:
              name: unique__id_guardador_veiculo_historico__guardador_veiculo_riorotativo_historico
          - not_null:
              name: not_null__id_guardador_veiculo_historico__guardador_veiculo_riorotativo_historico
      - name: data
        description: "{{ doc('data_captura') }} (partição)"
        data_type: date
        quote: true
      - name: cnpj
        description: "{{ doc('cnpj_entidade_credenciadora_riorotativo') }}"
        data_type: string
        quote: true
      - name: documento
        description: "{{ doc('documento_cliente') }} [protegido]"
        data_type: string
        quote: true
        policy_tags:
          - "projects/rj-smtr/locations/us/taxonomies/3253131507972485630/policyTags/7025840748337599362"
        tests:
          - not_null:
              name: not_null__documento__guardador_veiculo_riorotativo_historico
          - dbt_expectations.expect_column_values_to_match_regex:
              name: dbt_expectations.expect_column_values_to_match_regex__documento__guardador_veiculo_riorotativo_historico
              arguments:
                regex: "^[0-9]{11}$"
      - name: tipo_documento
        description: "{{ doc('tipo_documento_guardador_veiculo_riorotativo') }}"
        data_type: string
        quote: true
      - name: id_cliente
        description: "{{ doc('id_cliente') }}"
        data_type: string
        quote: true
        policy_tags:
          - "projects/rj-smtr/locations/us/taxonomies/3253131507972485630/policyTags/8608468264029421163"
      - name: nome
        description: "{{ doc('nome_cliente') }} [protegido]"
        data_type: string
        quote: true
        policy_tags:
          - "projects/rj-smtr/locations/us/taxonomies/3253131507972485630/policyTags/7025840748337599362"
      - name: email
        description: "{{ doc('email_guardador_veiculo_riorotativo') }} [protegido]"
        data_type: string
        quote: true
        policy_tags:
          - "projects/rj-smtr/locations/us/taxonomies/3253131507972485630/policyTags/7025840748337599362"
      - name: telefone
        description: "{{ doc('telefone_cliente') }} [protegido]"
        data_type: string
        quote: true
        policy_tags:
          - "projects/rj-smtr/locations/us/taxonomies/3253131507972485630/policyTags/7025840748337599362"
      - name: razao_social
        description: "{{ doc('razao_social_entidade_credenciadora_riorotativo') }}"
        data_type: string
        quote: true
      - name: nome_fantasia
        description: "{{ doc('nome_fantasia_entidade_credenciadora_riorotativo') }}"
        data_type: string
        quote: true
      - name: status
        description: Status do guardador de veículo
        data_type: string
        quote: true
      - name: motivo_bloqueio
        description: "{{ doc('motivo_bloqueio_riorotativo') }}"
        data_type: string
        quote: true
      - name: decisao_bloqueio
        description: "{{ doc('decisao_bloqueio_riorotativo') }}"
        data_type: string
        quote: true
      - name: versao
        description: "{{ doc('versao') }}"
        data_type: string
        quote: true
      - name: datetime_ultima_atualizacao
        description: "{{ doc('datetime_ultima_atualizacao') }}"
        data_type: datetime
        quote: true
      - name: id_execucao_dbt
        description: "{{ doc('id_execucao_dbt') }}"
        data_type: string
        quote: true
