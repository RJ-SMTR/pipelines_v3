  - name: perfil_funcionamento_riorotativo
    description: |
      Uma linha por perfil de funcionamento (id_perfil_funcionamento) do Rio Rotativo, com dias da semana
      e horários aplicáveis.
      Estado atual: última partição de captura da janela date_range_start/date_range_end.
      Desabilitado em backfills com janela antiga (is_current_state_enabled), para não sobrescrever o estado atual
      com dados históricos.
      Use id_perfil_funcionamento para junções com area_estacionamento_riorotativo.
      Fonte: staging_perfil_funcionamento_riorotativo (captura source_riorotativo.perfil_funcionamento).
      Perfil ausente da última captura é considerado removido.
      Exceções aos perfis ficam em perfil_funcionamento_riorotativo_historico.
    tests:
      - dbt_utils.expression_is_true:
          name: dbt_utils.expression_is_true__perfil_funcionamento_riorotativo
          arguments:
            expression: "(select count(1) from unnest(dias_semana) as dia_semana where dia_semana not between 1 and 7) = 0"
    columns:
      - name: id_perfil_funcionamento
        description: "{{ doc('perfil_funcionamento_codigo_riorotativo') }}"
        data_type: string
        quote: true
        tests:
          - unique:
              name: unique__id_perfil_funcionamento__perfil_funcionamento_riorotativo
          - not_null:
              name: not_null__id_perfil_funcionamento__perfil_funcionamento_riorotativo
      - name: nome
        description: "{{ doc('perfil_funcionamento_nome_riorotativo') }}"
        data_type: string
        quote: true
        tests:
          - not_null:
              name: not_null__nome__perfil_funcionamento_riorotativo
      - name: dias_semana
        description: "{{ doc('perfil_funcionamento_dia_semana_riorotativo') }}"
        data_type: array
        quote: true
        tests:
          - not_null:
              name: not_null__dias_semana__perfil_funcionamento_riorotativo
      - name: horario_inicio
