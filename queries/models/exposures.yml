version: 1

exposures:
  - name: painel_gestao_frota
    type: dashboard
    description: >
      View de gestão da frota de ônibus com consolidação de regras de licenciamento e
      operadoras do Serviço Público de Transporte de Passageiros por meio de Ônibus do
      Município do Rio de Janeiro (SPPO).

    owner:
      name: TR/SUBTT/CMO
      email: marcio.caldeira@prefeitura.rio
      roles:
        - Owner
        - Business Data Steward

    depends_on:
      - ref('view_veiculo_operadora')

    config:
      meta:
        data_product_name: View de gestão da frota de ônibus
        data_usage_frequency: daily
        business_value: >
          Unificar os registos de duas arquiteturas distintas de licenciamento de frota (tabela
          antiga até 31/03/2025 e tabela nova a partir de 01/04/2025). Além dos dados originais do
          veículo (como ano de fabricação, carroceria, chassi e indicador de ar-condicionado), a view
          enriquece a base ao associar o prefixo do veículo (id_veiculo) à sua respectiva empresa
          operadora, criando os campos cod_veiculo e operadora.
        data_contract: TED_005-26_DTDI/SUBTT-SUBTOP/CGR
        technical_data_steward:
          email: janaina.duarte@prefeitura.rio
          unit: IPLANRIO/PRE/VPIA/DTDI
          core: Subsídio
          team:
            - rodrigo.fcunha@prefeitura.rio
            - victormiguel@prefeitura.rio