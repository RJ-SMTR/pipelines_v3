name: CD - DBT Docs Generation and Upload

on:
  push:
    branches:
      - master
      - staging/*
    # paths:
    #   - 'queries/**'
    #   - '.github/workflows/cd_dbt_docs.yaml'
  workflow_dispatch:

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCS_BUCKET_NAME: rj-smtr-public
  GCP_SA_KEY: ${{ secrets.GKE_SA_KEY }}

jobs:
  generate-and-upload-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install project dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev unixodbc-dev gcc build-essential
          uv sync --all-packages

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ env.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          version: "latest"

      - name: Setup credentials for dbt
        run: |-

          echo "Mounting files from env..."

          echo '${{ env.GCP_SA_KEY }}'> /tmp/credentials.json

      - name: Generate dbt docs
        run: |
          cd queries
          uv run dbt deps --target prod
          uv run dbt docs generate --static --target prod

      - name: Upload docs to GCS
        run: |
          gsutil -m cp queries/target/index.html gs://${{ env.GCS_BUCKET_NAME }}/dbt-docs/
          gsutil -m cp queries/target/manifest.json gs://${{ env.GCS_BUCKET_NAME }}/dbt-docs/

