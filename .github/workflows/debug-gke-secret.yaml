name: DEBUG GKE_SA_KEY format (TEMP - DELETE AFTER)

on:
  push:
    branches:
      - devops/fix-dbt-checks
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect secret format
        env:
          KEY: ${{ secrets.GKE_SA_KEY }}
        run: |
          echo "=== length ==="
          echo "len: ${#KEY}"

          echo "=== first 3 chars ==="
          echo "first3: ${KEY:0:3}"

          echo "=== plaintext JSON check ==="
          if echo "$KEY" | jq -e .type >/dev/null 2>&1; then
            echo "RESULT: PLAINTEXT JSON"
            echo "type: $(echo "$KEY" | jq -r .type)"
          else
            echo "not plaintext JSON"
          fi

          echo "=== base64 JSON check ==="
          if echo "$KEY" | base64 -d 2>/dev/null | jq -e .type >/dev/null 2>&1; then
            echo "RESULT: BASE64 JSON"
            echo "type: $(echo "$KEY" | base64 -d | jq -r .type)"
          else
            echo "not base64 JSON"
          fi
