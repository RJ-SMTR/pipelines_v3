name: DBT Checks

on:
  push:
    branches:
      - master
      - staging/*
      - fix/*
    paths:
      - "queries/**/*.sql"
      - "queries/**/*.yml"
      - .github/workflows/dbt-checks.yaml

env:
  DBT_USER: ${{ github.actor }}

jobs:
  check-files:
    name: Compile DBT models and format SQL
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          activate-environment: true

      - name: Install project dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev unixodbc-dev gcc build-essential
          uv sync --all-packages

      # - name: Activate python venv
      #   run: |
      #     echo "VIRTUAL_ENV=$GITHUB_WORKSPACE/.venv" >> $GITHUB_ENV

# echo "$GITHUB_WORKSPACE/.venv/bin:$PATH" >> $GITHUB_ENV


      - name: Install sqlfmt
        run: pip install 'shandy-sqlfmt[jinjafmt]'

      - name: Get changed files
        id: files
        uses: tj-actions/changed-files@v34

      # - name: Check sh script
      #   run: |
      #     ls /home/runner/work/_temp | grep .sh | cat
      #     cat queries/setup_dbt_profiles.sh

      # - name: Setup DBT profile
      #   working-directory: queries
      #   run: sh setup_dbt_profiles.sh ${{ secrets.GKE_SA_KEY }}

      - name: Setup dbt profiles
        working-directory: queries
        run: |-
          mkdir -p ./credentials-dev
          mkdir -p ./credentials-prod
          mkdir -p ./profiles

          echo "Mounting files from env..."

          echo "${{ secrets.GKE_SA_KEY }}" > ./credentials-dev/dev.json
          echo "${{ secrets.GKE_SA_KEY }}" > ./credentials-prod/prod.json

          echo """
          queries:
            target: prod
            outputs:
              dev:
                type: bigquery
                method: service-account
                project: rj-smtr
                dataset: dbt
                location: US
                threads: 2
                keyfile: $PWD/credentials-dev/dev.json
              prod:
                type: bigquery
                method: service-account
                project: rj-smtr
                dataset: dbt
                location: US
                threads: 2
                keyfile: $PWD/credentials-prod/prod.json""" > profiles/profiles.yml

          cat profiles/profiles.yml

      - name: Run dbt deps
        working-directory: queries
        run: |-
          uv run dbt deps --profiles-dir profiles

      - name: Run sqlfmt
        if: steps.files.outputs.all_changed_files != ''
        run: sqlfmt --diff ${{ steps.files.outputs.all_changed_files }}

      - name: Run DBT compile
        working-directory: queries
        run: |-
          uv run dbt compile --profiles-dir profiles

